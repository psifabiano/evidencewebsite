name: build dist
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1

      - name: install
        run: bun install

      - name: build
        run: bun run build

      - name: upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
